<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Store - Premium</title>
    <style>
        /* =========================================
           ESTILOS BASE E PREMIUM DARK THEME
           ========================================= */
        :root {
            --background: #09090b;
            --surface: rgba(24, 24, 27, 0.7); /* Efeito Vidro */
            --border: rgba(255, 255, 255, 0.1);
            --primary: #00DFD8;
            --primary-glow: rgba(0, 223, 216, 0.3);
            --text-muted: #a1a1aa;
            --danger: #ef4444;
        }
        body { 
            background-color: var(--background); 
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 223, 216, 0.05) 0%, transparent 50%);
            color: #fff; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; 
            min-height: 100vh;
        }
        input, select { outline: none; }
        
        /* UTILITARIOS DE TELA */
        .screen { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; opacity: 0; transition: opacity 0.4s ease; }
        .active-screen { display: block; opacity: 1; animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slideUpFade { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* HEADER E LOGO */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .logo-text { font-size: 26px; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .logo-text span { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }

        /* BOTOES E FORMS */
        .btn-primary { 
            background: var(--primary); color: #000; border: none; padding: 14px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; width: 100%; 
            font-size: 15px; position: relative; overflow: hidden;
        }
        .btn-primary:hover:not([disabled]) { 
            transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); 
        }
        .btn-primary:active:not([disabled]) { transform: translateY(1px); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-outline:hover { background: var(--primary-glow); }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; 
            padding: 14px; border-radius: 8px; box-sizing: border-box; transition: 0.3s; 
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

        /* LOGIN SCREEN */
        .login-container { 
            max-width: 400px; margin: 50px auto; background: var(--surface); padding: 40px 30px; 
            border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            text-align: center; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .auth-link { color: var(--primary); font-size: 13px; cursor: pointer; text-decoration: none; margin-top: 20px; display: inline-block; transition: 0.2s; font-weight: bold; }
        .auth-link:hover { text-shadow: 0 0 8px var(--primary-glow); }

        /* CARDS DA VITRINE */
        .product-card { 
            background: var(--surface); border: 1px solid var(--border); padding: 15px; 
            border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(10px);
        }
        .product-card:hover { transform: translateY(-5px); border-color: rgba(0, 223, 216, 0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 20px var(--primary-glow); }
        .product-image { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #000; transition: 0.3s; }
        .product-card:hover .product-image { transform: scale(1.02); }

        /* MODAIS ANIMADOS */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        
        .premium-popup { 
            background: var(--surface); border: 1px solid var(--border); padding: 30px; 
            border-radius: 20px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.9) translateY(20px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal.active .premium-popup { transform: scale(1) translateY(0); }
        
        .flavor-selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 5px; }
        .flavor-btn { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 10px; 
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; 
        }
        .flavor-btn:hover:not([disabled]) { background: rgba(255,255,255,0.1); }
        .flavor-btn.selected { border-color: var(--primary); background: rgba(0, 223, 216, 0.15); box-shadow: inset 0 0 10px var(--primary-glow); color: var(--primary); }
        
        .checkout-summary { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid var(--border); }
        .summary-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #ccc; }
        .summary-line.total { font-size: 18px; color: #fff; font-weight: 900; }
        
        .hold-btn { position: relative; width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; overflow: hidden; transition: 0.2s; }
        .hold-btn:active { transform: scale(0.98); }
        .hold-progress-bar { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, transparent, var(--primary)); width: 0%; transition: width 0.1s linear; opacity: 0.5; }
        .hold-text { position: relative; z-index: 2; font-size: 15px; }
        
        /* TOAST NOTIFICATIONS (Substituindo os Alerts) */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { 
            background: var(--surface); backdrop-filter: blur(10px); border-left: 4px solid var(--primary); 
            padding: 16px 24px; border-radius: 12px; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex; align-items: center; gap: 15px; pointer-events: auto;
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        .toast.error { border-left-color: var(--danger); }
        .toast.fadeOut { animation: fadeOutRight 0.4s forwards; }
        .toast-icon { font-size: 24px; }
        .toast-content strong { display: block; font-size: 15px; margin-bottom: 2px; }
        .toast-content span { font-size: 13px; color: var(--text-muted); }
        
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="toast-container"></div>

    <div id="login-screen" class="screen active-screen">
        <div class="login-container">
            <h1 class="logo-text" style="margin-bottom: 5px;">HUB <span>STORE</span></h1>
            <p id="auth-subtitle" style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">Acesso Exclusivo</p>
            
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Telefone (WhatsApp)</label>
                    <input type="text" id="login-phone" placeholder="Ex: 42999999999" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Senha ou Código</label>
                    <input type="password" id="login-code" placeholder="Digite sua senha" required autocomplete="off">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 15px;">Entrar na Loja</button>
                <span class="auth-link" onclick="toggleAuthMode('register')">Não tem conta? Cadastre-se aqui</span>
            </form>

            <form id="form-register" onsubmit="handleRegister(event)" style="display: none;">
                <div class="form-group"><label>Seu Nome Completo</label><input type="text" id="reg-name" placeholder="Como quer ser chamado?" required autocomplete="off"></div>
                <div class="form-group"><label>Telefone (WhatsApp)</label><input type="text" id="reg-phone" placeholder="Ex: 42999999999" required autocomplete="off"></div>
                <div class="form-group"><label>Crie uma Senha</label><input type="password" id="reg-password" placeholder="Senha para acessar a loja" required autocomplete="off"></div>
                <button type="submit" class="btn-primary" style="margin-top: 15px;">Criar Minha Conta</button>
                <span class="auth-link" onclick="toggleAuthMode('login')">Já tem conta? Faça Login</span>
            </form>
        </div>
    </div>

    <div id="store-screen" class="screen">
        <header>
            <h1 class="logo-text">HUB <span>STORE</span></h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="admin-btn-header" class="btn-outline" style="display: none;" onclick="showAdminPanel()">⚙️ Estoque</button>
                <button onclick="logout()" style="background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-weight: bold; transition: 0.2s;">Sair</button>
            </div>
        </header>
        <div id="products-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;"></div>
    </div>

    <div id="admin-screen" class="screen">
        <header>
            <h1 class="logo-text">Gestão de <span>Estoque</span></h1>
            <button class="btn-outline" onclick="showStorefront()">Voltar para Loja</button>
        </header>
        <div style="background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(10px);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 style="margin: 0;">Dispositivos Cadastrados</h3>
                <button class="btn-primary" style="width: auto; padding: 10px 20px;" onclick="openModal('add-product-modal')">+ Novo Modelo</button>
            </div>
            <div id="admin-stock-list"></div>
        </div>
    </div>

    <div class="modal" id="buy-modal">
        <div class="modal-content premium-popup">
            <h3 style="margin-top: 0; font-size: 20px;">Configurar Entrega</h3>
            <form id="order-form" onsubmit="return false;">
                <div class="form-group">
                    <label>Sabor Selecionado:</label>
                    <div id="flavor-buttons-container" class="flavor-selector-grid"></div>
                </div>
                <div class="form-group"><label>Endereço de Destino</label><input type="text" id="client-address" required></div>
                <div class="form-group">
                    <label>Forma de Pagamento</label>
                    <select id="buy-payment-method" onchange="toggleTrocoField()" required>
                        <option value="" disabled selected>Selecione...</option><option value="Pix">Pix na Entrega</option><option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                <div class="form-group" id="troco-container" style="display: none;">
                    <label>Precisa de Troco?</label>
                    <select id="buy-change-needed" onchange="toggleTrocoValorField()"><option value="Não">Não</option><option value="Sim">Sim</option></select>
                    <input type="number" step="0.01" id="buy-change-value" placeholder="Troco para quanto? (Ex: 100)" style="margin-top: 10px; display: none;">
                </div>
                <div class="checkout-summary">
                    <div class="summary-line"><span>Dispositivo:</span> <span id="summary-prod-price">R$ 0,00</span></div>
                    <div class="summary-line"><span>Logística:</span> <span style="color: var(--primary); font-weight: bold;">GRÁTIS</span></div>
                    <hr style="border-color: rgba(255,255,255,0.1); margin: 12px 0;">
                    <div class="summary-line total"><span>Total:</span> <span id="summary-total-price">R$ 0,00</span></div>
                </div>
                <div class="hold-to-confirm-container">
                    <button type="button" id="btn-hold-trigger" class="hold-btn"><div class="hold-progress-bar" id="hold-progress-fill"></div><span class="hold-text">Segure para Confirmar Ordem</span></button>
                </div>
                <button type="button" style="width: 100%; background: transparent; border: none; color: var(--text-muted); padding: 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.2s;" onclick="closeModal('buy-modal')">Voltar</button>
            </form>
        </div>
    </div>

    <div class="modal" id="add-product-modal">
        <div class="modal-content premium-popup">
            <h3 style="margin-top: 0; font-size: 20px;">Adicionar Novo Modelo</h3>
            <form onsubmit="handleAddNewProduct(event)">
                <div class="form-group"><label>Nome do Dispositivo</label><input type="text" id="new-prod-name" placeholder="Ex: Ignite V50" required></div>
                <div class="form-group"><label>Preço (R$)</label><input type="number" step="0.01" id="new-prod-price" placeholder="Ex: 120.00" required></div>
                <div class="form-group"><label>Puffs (Opcional)</label><input type="text" id="new-prod-puffs" placeholder="Ex: 5000"></div>
                <div class="form-group"><label>URL da Imagem</label><input type="url" id="new-prod-image" placeholder="Link da foto do produto" required></div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Criar Modelo</button>
                <button type="button" style="width: 100%; background: transparent; border: none; color: var(--text-muted); padding: 15px; border-radius: 8px; cursor: pointer; margin-top: 5px; font-weight: bold;" onclick="closeModal('add-product-modal')">Cancelar</button>
            </form>
        </div>
    </div>

    <a href="https://api.whatsapp.com/send?phone=5542988141603&text=Olá! Estou no site e gostaria de tirar uma dúvida sobre os dispositivos." target="_blank" style="position: fixed; bottom: 25px; right: 25px; background-color: #25D366; color: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(37,211,102,0.5); z-index: 999; text-decoration: none; transition: 0.3s; border: 2px solid rgba(255,255,255,0.2);">
        <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.85 7.85 0 0 0 12.41 1.156C11.166.496 9.74.174 8.32.172A7.9 7.9 0 0 0 .173 8.061c0 1.503.393 2.97 1.14 4.28L0 16l3.73-.978a7.87 7.87 0 0 0 3.803.974c1.417-.001 2.822-.323 3.99-1.002A7.86 7.86 0 0 0 13.6 13.6a7.85 7.85 0 0 0 1.168-3.996c.002-1.417-.32-2.822-.967-3.991M10.534 11.3c-.326.112-1.344.405-2.13-.264-1.322-1.12-1.614-2.288-1.701-2.65-.088-.363-.047-.56.096-.708.125-.13.25-.3.374-.45.125-.15.166-.25.25-.417.083-.166.042-.312-.02-.457-.063-.146-.56-1.348-.767-1.85-.203-.491-.41-.424-.56-.432-.146-.008-.314-.008-.48-.008s-.438.063-.666.312c-.229.249-.875.855-.875 2.08s.9 2.406.996 2.54c.097.136 1.77 2.706 4.289 3.791.6.259 1.069.414 1.434.53.603.19 1.152.163 1.587.099.486-.07 1.488-.609 1.698-1.196.21-.587.21-1.09.147-1.197-.063-.107-.23-.172-.556-.334"/></svg>
    </a>

    <script src="script.js"></script>
</body>
</html>
